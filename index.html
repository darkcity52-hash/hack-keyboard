<!DOCTYPE html><html lang="es"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no"><title>HACK KEYBOARD v3.0</title><style>:root{--bg:#0a0a0a;--key:#0d1a0d;--mod:#003300;--fg:#00ff41;--act:#00ff41;--afg:#000;--tbg:#050f05;--brd:#00ff41;--st:#00cc33}*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}body{background:var(--bg);color:var(--fg);font-family:'Courier New',monospace;display:flex;flex-direction:column;height:100vh;overflow:hidden}#title{text-align:center;padding:6px;font-size:15px;font-weight:bold;border-bottom:1px solid var(--brd)}#stats{text-align:right;padding:3px 10px;font-size:11px;color:var(--st)}#tw{flex:1;padding:6px 8px}#display{width:100%;height:100%;background:var(--tbg);color:var(--fg);border:1px solid var(--brd);border-radius:8px;padding:8px;font-family:'Courier New',monospace;font-size:14px;resize:none;outline:none;caret-color:var(--fg)}#sbar{padding:3px 10px;font-size:11px;color:var(--st);display:flex;justify-content:space-between;border-top:1px solid #111}#kb{padding:3px 3px 6px}.row{display:flex;justify-content:center;gap:2px;margin-bottom:2px}.key{background:var(--key);color:var(--fg);border:1px solid var(--brd);border-radius:5px;display:flex;align-items:center;justify-content:center;font-family:'Courier New',monospace;font-size:10px;font-weight:bold;height:40px;cursor:pointer;flex-shrink:0}.key.mod{background:var(--mod)}.key.on{background:var(--act);color:var(--afg)}.key.fl{background:var(--act);color:var(--afg);box-shadow:0 0 8px var(--act)}#tmenu{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.88);z-index:99;flex-direction:column;align-items:center;justify-content:center;gap:8px}#tmenu.open{display:flex}#tmenu h2{color:var(--fg);letter-spacing:3px;margin-bottom:8px}.tbtn{width:250px;height:50px;border-radius:10px;border:2px solid;font-family:'Courier New',monospace;font-size:15px;font-weight:bold;cursor:pointer;display:flex;align-items:center;padding:0 14px;justify-content:space-between}.tdot{width:20px;height:20px;border-radius:4px}#hpanel{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.92);z-index:99;flex-direction:column;padding:16px;gap:6px;overflow-y:auto}#hpanel.open{display:flex}#hpanel h2{color:var(--fg);letter-spacing:2px}.hi{background:var(--tbg);border:1px solid var(--brd);border-radius:6px;padding:8px;font-size:12px;cursor:pointer}#chist{background:var(--mod);color:var(--fg);border:1px solid var(--brd);border-radius:6px;padding:10px;text-align:center;cursor:pointer;margin-top:6px}</style></head><body>
<div id="title">[ HACK KEYBOARD v3.0 ]</div>
<div id="stats">palabras:<span id="wc">0</span> chars:<span id="cc">0</span></div>
<div id="tw"><textarea id="display" placeholder="Escribe aqui..."></textarea></div>
<div id="sbar"><span id="st">▶ READY</span><span id="mods"></span></div>
<div id="kb"></div>
<div id="tmenu"><h2>[ TEMAS ]</h2></div>
<div id="hpanel"><h2>[ HISTORIAL ]</h2><div id="hl"></div><div id="chist" onclick="closeH()">✕ CERRAR</div></div>
<script>
const T={Matrix:{bg:"#0a0a0a",key:"#0d1a0d",mod:"#003300",fg:"#00ff41",act:"#00ff41",afg:"#000",tbg:"#050f05",brd:"#00ff41",st:"#00cc33"},Cyberpunk:{bg:"#08001f",key:"#110033",mod:"#220066",fg:"#00eeff",act:"#ff00aa",afg:"#fff",tbg:"#05001a",brd:"#ff00aa",st:"#cc00ff"},BloodRed:{bg:"#0a0000",key:"#1a0000",mod:"#330000",fg:"#ff2200",act:"#ff2200",afg:"#000",tbg:"#050000",brd:"#ff2200",st:"#cc1100"},IceCold:{bg:"#00080f",key:"#001824",mod:"#003344",fg:"#00cfff",act:"#00cfff",afg:"#000",tbg:"#00060d",brd:"#00cfff",st:"#0099cc"},Amber:{bg:"#0a0700",key:"#1a1100",mod:"#332200",fg:"#ffaa00",act:"#ffaa00",afg:"#000",tbg:"#050400",brd:"#ffaa00",st:"#cc8800"}};
const TN=Object.keys(T);
let ct="Matrix";
function applyT(n){ct=n;const t=T[n],r=document.documentElement.style;r.setProperty("--bg",t.bg);r.setProperty("--key",t.key);r.setProperty("--mod",t.mod);r.setProperty("--fg",t.fg);r.setProperty("--act",t.act);r.setProperty("--afg",t.afg);r.setProperty("--tbg",t.tbg);r.setProperty("--brd",t.brd);r.setProperty("--st",t.st);document.getElementById("tmenu").classList.remove("open");setSt("Tema: "+n)}
const tm=document.getElementById("tmenu");
TN.forEach(n=>{const t=T[n],b=document.createElement("div");b.className="tbtn";b.style.background=t.key;b.style.borderColor=t.act;b.style.color=t.fg;b.innerHTML=`<span>${n}</span><div class="tdot" style="background:${t.act}"></div>`;b.onclick=()=>applyT(n);tm.appendChild(b)});
const cb=document.createElement("div");cb.style.cssText="color:#fff;cursor:pointer;margin-top:8px;font-size:13px;";cb.textContent="✕ CERRAR";cb.onclick=()=>tm.classList.remove("open");tm.appendChild(cb);
const ROWS=[[["ESC",1.2],["F1",1],["F2",1],["F3",1],["F4",1],["F5",1],["F6",1],["F7",1],["F8",1],["F9",1],["F10",1],["F11",1],["F12",1]],[["`",1],["1",1],["2",1],["3",1],["4",1],["5",1],["6",1],["7",1],["8",1],["9",1],["0",1],["-",1],["=",1],["DEL",1.8]],[["TAB",1.5],["Q",1],["W",1],["E",1],["R",1],["T",1],["Y",1],["U",1],["I",1],["O",1],["P",1],["[",1],["]",1],["\\",1.5]],[["CAPS",1.8],["A",1],["S",1],["D",1],["F",1],["G",1],["H",1],["J",1],["K",1],["L",1],[";",1],["'",1],["ENTER",2.2]],[["SHIFT",2.5],["Z",1],["X",1],["C",1],["V",1],["B",1],["N",1],["M",1],[",",1],[".",1],["/",1],["SHIFT",2.5]],[["CTRL",1.5],["ALT",1.2],["THEME",1.5],["SPACE",5.5],["HIST",1.3],["FN",1.1],["CTRL",1.5]]];
const SM={"`":"~","1":"!","2":"@","3":"#","4":"$","5":"%","6":"^","7":"&","8":"*","9":"(","0":")","-":"_","=":"+","[":"{","]":"}","\\":"|",";":":","'":'"',",":"<",".":">","/":"?"};
const MODS=new Set(["SHIFT","CTRL","ALT","CAPS","FN","THEME","HIST"]);
let sh=false,cp=false,ct2=false,al=false,hist=[],disp=document.getElementById("display");
const kb=document.getElementById("kb"),vw=window.innerWidth;
ROWS.forEach(row=>{const rd=document.createElement("div");rd.className="row";const tot=row.reduce((s,[,w])=>s+w,0);row.forEach(([lb,wm])=>{const b=document.createElement("div");b.className="key"+(MODS.has(lb)?" mod":"");b.textContent=lb;b.style.width=Math.floor((vw-14)*wm/tot)-2+"px";b.dataset.k=lb;b.addEventListener("touchstart",e=>{e.preventDefault();onK(lb,b)},{passive:false});b.addEventListener("mousedown",e=>{e.preventDefault();onK(lb,b)});rd.appendChild(b)});kb.appendChild(rd)});
function fl(b){b.classList.add("fl");setTimeout(()=>b.classList.remove("fl"),120)}
function updM(){const m=document.getElementById("mods");let s="";if(cp)s+=" CAPS";if(sh)s+=" SHF";if(ct2)s+=" CTRL";if(al)s+=" ALT";m.textContent=s;document.querySelectorAll(".key").forEach(b=>{const k=b.dataset.k;if((k==="CAPS"&&cp)||(k==="SHIFT"&&sh)||(k==="CTRL"&&ct2)||(k==="ALT"&&al))b.classList.add("on");else b.classList.remove("on")})}
function setSt(msg,ms=2000){document.getElementById("st").textContent="▶ "+msg;setTimeout(()=>document.getElementById("st").textContent="▶ READY",ms)}
function updS(){const tx=disp.value;document.getElementById("wc").textContent=tx.trim().split(/\s+/).filter(Boolean).length;document.getElementById("cc").textContent=tx.length}
function saveH(){const s=disp.value;if(!hist.length||hist[hist.length-1]!==s){hist.push(s);if(hist.length>50)hist.shift()}}
function onK(lb,btn){fl(btn);if(navigator.vibrate)navigator.vibrate(25);if(lb==="THEME"){tm.classList.toggle("open");return}if(lb==="HIST"){openH();return}if(lb==="CAPS"){cp=!cp;updM();return}if(lb==="SHIFT"){sh=!sh;updM();return}if(lb==="CTRL"){ct2=!ct2;updM();return}if(lb==="ALT"){al=!al;updM();return}if(lb==="FN")return;if(ct2&&!MODS.has(lb)){ct2=false;updM();hdSC(lb);return}if(lb==="DEL"){saveH();disp.value=disp.value.slice(0,-1);updS();return}if(lb==="ENTER"){saveH();disp.value+="\n";updS();return}if(lb==="TAB"){saveH();disp.value+="    ";updS();return}if(lb==="SPACE"){saveH();disp.value+=" ";updS();return}if(["ESC","F1","F2","F3","F4","F5","F6","F7","F8","F9","F10","F11","F12"].includes(lb)){setSt("["+lb+"]");return}if(lb.length===1){let c=lb;if(sh){c=SM[c]||c.toUpperCase();sh=false;updM()}else if(cp&&/[a-zA-Z]/.test(c))c=c.toUpperCase();else c=c.toLowerCase();saveH();disp.value+=c;updS()}disp.scrollTop=disp.scrollHeight}
function hdSC(lb){if(lb==="Z"&&hist.length>1){hist.pop();disp.value=hist[hist.length-1];updS();setSt("Deshacer")}else if(lb==="A"){disp.select();setSt("Todo sel.")}else if(lb==="N"){saveH();disp.value="";updS();setSt("Nuevo")}else if(lb==="C"){navigator.clipboard?.writeText(disp.value);setSt("Copiado")}else if(lb==="V"){navigator.clipboard?.readText().then(t=>{disp.value+=t;updS();setSt("Pegado")})}}
function openH(){const p=document.getElementById("hpanel"),l=document.getElementById("hl");l.innerHTML="";if(!hist.length){l.innerHTML='<div style="color:#666;padding:10px">Sin historial</div>'}[...hist].reverse().forEach(s=>{const d=document.createElement("div");d.className="hi";d.textContent=s.slice(0,80)+(s.length>80?"...":"");d.onclick=()=>{disp.value=s;updS();closeH()};l.appendChild(d)});p.classList.add("open")}
function closeH(){document.getElementById("hpanel").classList.remove("open")}
disp.addEventListener("input",updS);applyT("Matrix");updS();
</script></body></html>
